# /etc/nginx/sites-available/portfolio  (symlink into sites-enabled)
# Single origin: /api -> NestJS (:3000), everything else -> Angular SSR (:4000).
# Run `certbot --nginx -d yourdomain.com -d www.yourdomain.com` afterwards; it
# rewrites this to add the 443 server + HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name 142.93.254.109;

    # Forward the real Host so Angular's NG_ALLOWED_HOSTS check passes,
    # and X-Forwarded-Proto so the app knows the request is HTTPS.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API — the Nest global prefix is /api, so the URI is passed through as-is.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
    }

    # Angular SSR (it also serves the hashed static assets from dist/browser).
    location / {
        proxy_pass http://127.0.0.1:4000;
    }

    client_max_body_size 2m;
}
