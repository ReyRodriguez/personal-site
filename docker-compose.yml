services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-blog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio_blog
    ports:
      - '5432:5432'
    volumes:
      - portfolio_blog_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d portfolio_blog']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portfolio_blog_data:
