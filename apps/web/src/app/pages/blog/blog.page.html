<section class="section-shell scroll-mt-28">
  <div class="section-inner">
    <app-section-header
      index="B0"
      kicker="WRITING.LOG"
      [title]="t().title"
      [lede]="t().lede"
    />

    @if (posts.isLoading()) {
      <p class="post-status font-mono">{{ t().loading }}</p>
    } @else if (posts.error()) {
      <p class="post-status post-error font-mono">{{ t().error }}</p>
    } @else {
      @let list = posts.value() ?? [];
      @if (list.length) {
        <div class="post-list border-t border-white/10">
          @for (post of list; track post.slug; let i = $index) {
            <app-post-row [post]="post" [delay]="i * 70" />
          }
        </div>
      } @else {
        <p class="post-status font-mono">{{ t().empty }}</p>
      }
    }
  </div>
</section>
