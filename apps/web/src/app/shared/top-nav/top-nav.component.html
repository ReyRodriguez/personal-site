<header class="top-nav-shell fixed inset-x-0 top-0 z-50 px-3 pt-3 sm:px-5">
  <nav
    class="top-nav mx-auto flex h-14 max-w-[var(--layout-max)] items-center justify-between gap-4 px-4 sm:px-6"
    [attr.aria-label]="navAria()"
  >
    <a
      class="brand shrink-0"
      href="#root"
      (click)="activate('root')"
      aria-label="Reyderson Rodriguez — inicio"
    >
      <span class="brand-mark" aria-hidden="true">RR</span>
      <span class="brand-name">REYDERSON RODRIGUEZ</span>
    </a>

    <div
      class="nav-links flex min-w-0 flex-1 justify-center gap-1 overflow-x-auto"
    >
      @for (item of navItems; track item.id) {
        <a
          class="nav-link"
          [class.nav-link-active]="activeSection() === item.id"
          [href]="'#' + item.id"
          (click)="activate(item.id)"
        >
          <span class="nav-slash" aria-hidden="true">/</span>{{ item.label }}
        </a>
      }
    </div>

    <div class="lang-toggle shrink-0" role="group" aria-label="Language">
      <button
        type="button"
        class="lang-btn"
        [class.lang-btn-active]="locale() === 'es'"
        [attr.aria-pressed]="locale() === 'es'"
        (click)="setLocale('es')"
      >
        ES
      </button>
      <span class="lang-sep" aria-hidden="true">/</span>
      <button
        type="button"
        class="lang-btn"
        [class.lang-btn-active]="locale() === 'en'"
        [attr.aria-pressed]="locale() === 'en'"
        (click)="setLocale('en')"
      >
        EN
      </button>
    </div>
  </nav>
</header>
