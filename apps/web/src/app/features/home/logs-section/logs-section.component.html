<section id="logs" class="logs-shell section-shell scroll-mt-28">
  <div class="section-inner">
    <app-section-header
      appReveal
      index="08"
      kicker="BUILD.LOG"
      [title]="header().title"
      [lede]="header().lede"
    />

    <div class="log-list border-t border-white/10">
      @for (note of notes; track note.ref; let i = $index) {
        <article class="log-row" appReveal [revealDelay]="i * 70">
          <span class="log-ref font-mono" aria-hidden="true">
            <span class="log-slash">/</span>{{ note.ref }}
          </span>
          <div class="log-body">
            <p class="terminal-label mb-2 text-matrix-green">{{ note.tag }}</p>
            <h3 class="log-title text-xl font-semibold leading-snug text-text-primary sm:text-2xl">
              {{ note.title[locale()] }}
            </h3>
          </div>
        </article>
      }
    </div>
  </div>
</section>
