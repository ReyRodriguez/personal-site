<section id="labs" class="capability-shell section-shell scroll-mt-28">
  <div class="section-inner">
    <app-section-header
      appReveal
      index="04"
      kicker="CAPABILITIES"
      [title]="header().title"
      [lede]="header().lede"
    />

    <div class="capability-grid">
      @for (capability of capabilities; track capability.id; let i = $index) {
        <article
          class="capability-card glass-panel hover-border-glow group"
          appReveal
          [revealDelay]="i * 60"
        >
          <span class="capability-id" aria-hidden="true">{{ capability.id }}</span>
          <h3 class="mt-4 text-lg font-semibold leading-snug text-text-primary">
            {{ capability.title[locale()] }}
          </h3>
          <p class="mt-2 flex-1 text-sm leading-6 text-text-muted">
            {{ capability.proof[locale()] }}
          </p>
          <ul class="mt-5 flex flex-wrap gap-2">
            @for (tech of capability.stack; track tech) {
              <li class="chip">{{ tech }}</li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
