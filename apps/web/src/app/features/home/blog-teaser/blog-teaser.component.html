<section id="blog" class="section-shell scroll-mt-28">
  <div class="section-inner">
    <app-section-header
      appReveal
      index="03"
      kicker="WRITING.LOG"
      [title]="t().title"
      [lede]="t().lede"
    />

    <div class="post-list border-t border-white/10">
      @for (post of posts; track post.slug; let i = $index) {
        <a
          class="post-row"
          [routerLink]="['/blog', post.slug]"
          appReveal
          [revealDelay]="i * 70"
        >
          <span class="post-meta font-mono">
            <span class="post-date">{{ post.date }}</span>
            @if (post.upcoming) {
              <span class="post-soon">{{ t().soon }}</span>
            }
          </span>
          <div class="post-body">
            <p class="terminal-label mb-2 text-matrix-green">{{ post.tag }}</p>
            <h3 class="post-title text-xl font-semibold leading-snug text-text-primary sm:text-2xl">
              {{ post.title[locale()] }}
            </h3>
            <p class="post-excerpt mt-2 text-sm leading-6 text-text-muted">
              {{ post.excerpt[locale()] }}
            </p>
          </div>
          <span class="post-arrow font-mono" aria-hidden="true">→</span>
        </a>
      }
    </div>

    <a class="post-viewall focus-link mt-8 inline-flex" routerLink="/blog">
      {{ t().viewAll }}
    </a>
  </div>
</section>
