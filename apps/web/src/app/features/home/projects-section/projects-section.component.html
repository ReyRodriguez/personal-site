<section id="projects" class="projects-shell section-shell scroll-mt-28">
  <div class="section-inner">
    <app-section-header
      appReveal
      index="02"
      kicker="PROJECTS.INDEX"
      [title]="header().title"
      [lede]="header().lede"
    />

    <div class="project-grid">
      @for (project of projects; track project.company; let i = $index) {
        <article
          class="project-card glass-panel hover-border-glow group p-6 sm:p-7"
          appReveal
          [revealDelay]="i * 90"
        >
          <div class="flex items-center justify-between gap-4">
            <span class="project-icon">{{ project.icon }}</span>
            <span class="project-period">{{ project.period[locale()] }}</span>
          </div>

          <p class="project-company mt-7 terminal-label text-matrix-green">
            {{ project.company }}
          </p>
          <h3 class="project-title mt-3 text-xl font-semibold leading-snug text-text-primary sm:text-2xl">
            {{ project.title[locale()] }}
          </h3>

          <p class="mt-4 flex-1 text-sm leading-7 text-text-muted">
            {{ project.impact[locale()] }}
          </p>

          <ul class="mt-6 flex flex-wrap gap-2">
            @for (tech of project.stack; track tech) {
              <li class="chip">{{ tech }}</li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
