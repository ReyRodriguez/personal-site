<section id="workflow" class="section-shell scroll-mt-28">
  <div class="section-inner">
    <app-section-header
      appReveal
      index="02"
      kicker="AI_WORKFLOW"
      [title]="t().title"
      [lede]="t().lede"
    />

    <div class="relative py-8">
      <div class="pipeline-line hidden md:block"></div>
      <div class="relative z-10 grid grid-cols-1 gap-8 md:grid-cols-4">
        @for (node of t().nodes; track node.title; let i = $index) {
          <article class="flux-node group" appReveal [revealDelay]="i * 80">
            <div
              class="flux-icon glass-panel hover-border-glow"
              [class]="'tone-' + node.tone"
            >
              {{ node.icon }}
            </div>
            <div>
              <h3 class="terminal-label mb-2 text-text-primary">
                {{ node.title }}
              </h3>
              <p class="flux-summary text-sm leading-6">
                {{ node.summary }}
              </p>
            </div>
          </article>
        }
      </div>
    </div>
  </div>
</section>
